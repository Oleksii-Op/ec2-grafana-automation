- name: Request short-lived IP certificate via certbot
  command: >
    {{ certbot_file_dest }} certonly
    --non-interactive
    --agree-tos
    --ip-address {{ public_ip }}
    --required-profile shortlived
    --standalone
  register: certbot_result
  changed_when: "'Congratulations' in certbot_result.stdout"

- name: Copy certs to Grafana dir with proper names
  ansible.builtin.copy:
    src: "/etc/letsencrypt/archive/{{ public_ip }}/{{ item.src }}"
    dest: "/etc/grafana/{{ item.dest }}"
    remote_src: true
    owner: grafana
    group: grafana
    mode: '0600'
  loop:
    - { src: "fullchain1.pem", dest: "grafana-fullchain.pem" }
    - { src: "privkey1.pem",   dest: "grafana.key" }

