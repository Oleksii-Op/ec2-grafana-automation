---
# tasks file for certbot-shortlived-ip-certs
- name: Validate required variables
  assert:
    that:
      - env_dir is string
      - certbot_file_dest is string
    fail_msg: "Required variables are missing or invalid"

- name: Install required system packages
  package:
    name:
      - python3
      - python3-dev
      - python3-venv
      - python3-pip
      - python3-setuptools
      - python3-packaging
      - libaugeas-dev
      - gcc
      - curl
    state: present

- name: Remove system certbot if requested
  package:
    name: certbot
    state: absent

- name: Create certbot virtual environment
  command: python3 -m venv {{ env_dir }}
  args:
    creates: "{{ env_dir }}/bin/activate"

- name: Upgrade pip in virtual environment
  pip:
    name: pip
    state: latest
    virtualenv: "{{ env_dir }}"

- name: Install certbot in virtual environment
  pip:
    name: certbot
    state: present
    virtualenv: "{{ env_dir }}"

- name: Expose certbot binary system-wide
  file:
    src: "{{ env_dir }}/bin/certbot"
    dest: "{{ certbot_file_dest }}"
    state: link
    owner: root
    group: root
    mode: "0755"

